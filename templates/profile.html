{% extends "base.html" %}
{% block content %}
<div class="card profile-card">
    <h2>个人中心</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if user %}
        <div class="user-info">
            <h3>用户资料</h3>
            <ul class="info-list">
                <li><span class="label">ID</span><span class="value">{{ user["id"] }}</span></li>
                <li><span class="label">用户名</span><span class="value">{{ user["username"] }}</span></li>
                <li><span class="label">邮箱</span><span class="value">{{ user["email"] }}</span></li>
                <li><span class="label">手机</span><span class="value">{{ user["phone"] }}</span></li>
                <li><span class="label">余额</span><span class="value">¥{{ "%.2f"|format(user["balance"]) }}</span></li>
            </ul>
        </div>

        <div class="recharge-section">
            <h3>充值</h3>
            <form method="post" action="/recharge" class="recharge-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" name="user_id" value="{{ user["id"] }}">
                <div class="form-group">
                    <label for="amount">充值金额</label>
                    <input type="number" id="amount" name="amount" placeholder="请输入充值金额" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary">充 值</button>
            </form>
        </div>
    {% endif %}
</div>
{% endblock %}
